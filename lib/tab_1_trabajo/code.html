<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0090ff",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1a23",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .form-select-icon {
            background-image: url('data:image/svg+xml,%3csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%2724px%27 height=%2724px%27 fill=%27rgb(0,144,255)%27 viewBox=%270 0 256 256%27%3e%3cpath d=%27M181.66,170.34a8,8,0,0,1,0,11.32l-48,48a8,8,0,0,1-11.32,0l-48-48a8,8,0,0,1,11.32-11.32L128,212.69l42.34-42.35A8,8,0,0,1,181.66,170.34Z%27%3e%3c/path%3e%3c/svg%3e');
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1.5rem;
        }
        ::-webkit-scrollbar {
            width: 0px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased h-screen overflow-hidden flex flex-col">
<!-- Header / Nav -->
<header class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-10">
<div class="max-w-2xl mx-auto px-4">
<div class="flex items-center justify-between h-16">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-lg font-bold">Perfil del Empleado</h1>
<div class="w-10"></div>
</div>
<nav class="flex gap-8">
<a class="flex flex-col items-center justify-center border-b-[3px] border-primary text-primary pb-3 pt-2" href="#">
<span class="text-sm font-bold tracking-tight">Trabajo</span>
</a>
<a class="flex flex-col items-center justify-center border-b-[3px] border-transparent text-slate-500 dark:text-slate-400 pb-3 pt-2" href="#">
<span class="text-sm font-bold tracking-tight">Personal</span>
</a>
<a class="flex flex-col items-center justify-center border-b-[3px] border-transparent text-slate-500 dark:text-slate-400 pb-3 pt-2" href="#">
<span class="text-sm font-bold tracking-tight">Nómina</span>
</a>
<a class="flex flex-col items-center justify-center border-b-[3px] border-transparent text-slate-500 dark:text-slate-400 pb-3 pt-2" href="#">
<span class="text-sm font-bold tracking-tight">Documentos</span>
</a>
</nav>
</div>
</header>
<!-- Content -->
<main class="flex-1 overflow-y-auto pb-32">
<div class="max-w-2xl mx-auto px-4 py-8 space-y-10">
<!-- Section 1: Información del Puesto -->
<section class="space-y-6">
<div class="flex items-center gap-3">
<div class="w-1.5 h-6 bg-primary rounded-full"></div>
<h2 class="text-xl font-bold tracking-tight">Información del Puesto</h2>
</div>
<div class="space-y-4">
<div class="group">
<label class="block text-sm font-semibold text-slate-600 dark:text-slate-400 mb-2 ml-1">Nombre Completo <span class="text-primary">*</span></label>
<input class="w-full h-16 px-6 bg-white dark:bg-slate-900 border-none rounded-xl shadow-sm focus:ring-2 focus:ring-primary/20 text-slate-900 dark:text-white text-lg placeholder:text-slate-300 dark:placeholder:text-slate-600 transition-all" placeholder="Introduce nombre completo" type="text"/>
</div>
<div class="group">
<label class="block text-sm font-semibold text-slate-600 dark:text-slate-400 mb-2 ml-1">Título del Puesto</label>
<input class="w-full h-16 px-6 bg-white dark:bg-slate-900 border-none rounded-xl shadow-sm focus:ring-2 focus:ring-primary/20 text-slate-900 dark:text-white text-lg placeholder:text-slate-300 dark:placeholder:text-slate-600 transition-all" placeholder="Ej. Especialista en Marketing" type="text"/>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div>
<label class="block text-sm font-semibold text-slate-600 dark:text-slate-400 mb-2 ml-1">Género</label>
<select class="form-select-icon w-full h-16 px-6 bg-white dark:bg-slate-900 border-none rounded-xl shadow-sm focus:ring-2 focus:ring-primary/20 text-slate-900 dark:text-white text-lg appearance-none transition-all">
<option disabled="" selected="">Seleccionar género</option>
<option value="masculino">Masculino</option>
<option value="femenino">Femenino</option>
<option value="otro">Otro</option>
</select>
</div>
<div>
<label class="block text-sm font-semibold text-slate-600 dark:text-slate-400 mb-2 ml-1">Departamento</label>
<select class="form-select-icon w-full h-16 px-6 bg-white dark:bg-slate-900 border-none rounded-xl shadow-sm focus:ring-2 focus:ring-primary/20 text-slate-900 dark:text-white text-lg appearance-none transition-all">
<option disabled="" selected="">Seleccionar departamento</option>
<option>Recursos Humanos</option>
<option>IT &amp; Tecnología</option>
<option>Ventas</option>
</select>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div>
<label class="block text-sm font-semibold text-slate-600 dark:text-slate-400 mb-2 ml-1">Gerente / Responsable</label>
<select class="form-select-icon w-full h-16 px-6 bg-white dark:bg-slate-900 border-none rounded-xl shadow-sm focus:ring-2 focus:ring-primary/20 text-slate-900 dark:text-white text-lg appearance-none transition-all">
<option disabled="" selected="">Seleccionar responsable</option>
<option>Ana Martínez</option>
<option>Carlos Ruiz</option>
</select>
</div>
<div>
<label class="block text-sm font-semibold text-slate-600 dark:text-slate-400 mb-2 ml-1">Entrenador / Coach</label>
<select class="form-select-icon w-full h-16 px-6 bg-white dark:bg-slate-900 border-none rounded-xl shadow-sm focus:ring-2 focus:ring-primary/20 text-slate-900 dark:text-white text-lg appearance-none transition-all">
<option disabled="" selected="">Seleccionar coach</option>
<option>Elena Gómez</option>
<option>Roberto Sanz</option>
</select>
</div>
</div>
</div>
</section>
<!-- Section 2: Contacto de Trabajo -->
<section class="space-y-6">
<div class="flex items-center gap-3">
<div class="w-1.5 h-6 bg-primary rounded-full"></div>
<h2 class="text-xl font-bold tracking-tight">Contacto de Trabajo</h2>
</div>
<div class="space-y-4">
<div class="group">
<label class="block text-sm font-semibold text-slate-600 dark:text-slate-400 mb-2 ml-1">Email de Trabajo</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-slate-400">mail</span>
<input class="w-full h-16 pl-14 pr-6 bg-white dark:bg-slate-900 border-none rounded-xl shadow-sm focus:ring-2 focus:ring-primary/20 text-slate-900 dark:text-white text-lg placeholder:text-slate-300 dark:placeholder:text-slate-600 transition-all" placeholder="ejemplo@empresa.com" type="email"/>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div>
<label class="block text-sm font-semibold text-slate-600 dark:text-slate-400 mb-2 ml-1">Teléfono Móvil</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-slate-400">smartphone</span>
<input class="w-full h-16 pl-14 pr-6 bg-white dark:bg-slate-900 border-none rounded-xl shadow-sm focus:ring-2 focus:ring-primary/20 text-slate-900 dark:text-white text-lg placeholder:text-slate-300 dark:placeholder:text-slate-600 transition-all" placeholder="+34 600 000 000" type="tel"/>
</div>
</div>
<div>
<label class="block text-sm font-semibold text-slate-600 dark:text-slate-400 mb-2 ml-1">Teléfono Fijo</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-slate-400">call</span>
<input class="w-full h-16 pl-14 pr-6 bg-white dark:bg-slate-900 border-none rounded-xl shadow-sm focus:ring-2 focus:ring-primary/20 text-slate-900 dark:text-white text-lg placeholder:text-slate-300 dark:placeholder:text-slate-600 transition-all" placeholder="+34 910 000 000" type="tel"/>
</div>
</div>
</div>
</div>
</section>
</div>
</main>
<!-- Fixed Bottom Button -->
<footer class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-background-light via-background-light to-transparent dark:from-background-dark dark:via-background-dark">
<div class="max-w-2xl mx-auto">
<button class="w-full h-16 bg-primary hover:bg-primary/90 text-white font-bold text-lg rounded-xl shadow-lg shadow-primary/25 transition-all flex items-center justify-center gap-2 group">
                Continuar
                <span class="material-symbols-outlined transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>
</div>
</footer>
</body></html>
